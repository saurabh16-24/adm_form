events {
    worker_connections 1024;
}

http {
    # ── General Settings ──────────────────────────────────────────────────────
    client_max_body_size 15M;          # Allow file uploads up to 15MB
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # ── Upstream Servers ──────────────────────────────────────────────────────
    upstream admissions_app {
        server svce-app:3000;
    }

    # ── Main Server Block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Project 1: ADMISSION-DATABASE (default / root) ────────────────────
        location / {
            proxy_pass http://admissions_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed later)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Project 2: (Add your second project here) ─────────────────────────
        # location /project2/ {
        #     proxy_pass http://project2_app:PORT/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        # ── Project 3: (Add your third project here) ─────────────────────────
        # location /project3/ {
        #     proxy_pass http://project3_app:PORT/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }
    }
}
