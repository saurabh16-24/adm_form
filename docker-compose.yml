version: '3.8'

services:
  db:
    image: postgres:15
    container_name: svce_admissions_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: svce_admissions
    ports:
      - "5432:5432"
    volumes:
      # Mount the initialization script so Postgres creates tables on first start
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data so it's not lost when container stops
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
